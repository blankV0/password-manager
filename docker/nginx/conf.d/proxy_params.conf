# ─────────────────────────────────────────────────────────────────────────────
# nginx/conf.d/proxy_params.conf
# Parâmetros comuns de proxy — incluídos nos location blocks
# ─────────────────────────────────────────────────────────────────────────────

# Passar o IP real do cliente para a app
proxy_set_header X-Forwarded-For  $proxy_add_x_forwarded_for;
proxy_set_header X-Real-IP        $remote_addr;
proxy_set_header X-Forwarded-Proto $scheme;

# Host original do pedido
proxy_set_header Host $host;

# Keepalive com upstream — NÃO enviar Connection: upgrade em pedidos normais
# (Connection: upgrade só é necessário para WebSocket, e quebra keepalive)
proxy_set_header Connection '';

# Usar HTTP/1.1 para keepalive com upstream
proxy_http_version 1.1;

# Timeouts (previne conexões presas)
proxy_connect_timeout 5s;
proxy_read_timeout    30s;
proxy_send_timeout    30s;

# Não expor erros internos do upstream ao cliente
proxy_intercept_errors on;

# Buffer — evitar que respostas lentas do upstream bloqueiem o Nginx
proxy_buffering on;
proxy_buffer_size 4k;
proxy_buffers 8 4k;
