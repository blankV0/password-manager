# ═════════════════════════════════════════════════════════════════════════════
# nginx/conf.d/auth.conf — Server Block do Auth Server
# ─────────────────────────────────────────────────────────────────────────────
#
# FLUXO DE UM PEDIDO:
#   Cliente → Nginx (443, TLS 1.3) → upstream auth:8000 (rede Docker interna)
#
# SEGURANÇA APLICADA AQUI:
#   ✓ TLS 1.2/1.3 apenas (bloqueia SSL 3.0, TLS 1.0, TLS 1.1)
#   ✓ Cipher suites fortes (ECDHE, AES-256-GCM, ChaCha20-Poly1305)
#   ✓ HSTS (força HTTPS no browser para os próximos 1 ano)
#   ✓ X-Frame-Options: DENY (previne clickjacking)
#   ✓ X-Content-Type-Options (previne MIME sniffing)
#   ✓ Content-Security-Policy (bloqueia inline scripts maliciosos)
#   ✓ Rate limiting diferenciado por endpoint
#   ✓ /docs e /redoc bloqueados em produção
#   ✓ Métodos HTTP restritos (só GET, POST, OPTIONS)
#
# ═════════════════════════════════════════════════════════════════════════════

# ─────────────────────────────────────────────────────────────────────────────
# Upstream — o container auth na rede interna Docker
# "auth" é o nome do serviço no docker-compose.yml (resolução automática por DNS)
# ─────────────────────────────────────────────────────────────────────────────
upstream auth_backend {
    server auth:8000;

    # keepalive: manter conexões TCP abertas com o upstream
    # Evita overhead de TCP handshake em cada pedido
    keepalive 32;
}

# ─────────────────────────────────────────────────────────────────────────────
# SERVIDOR HTTP (porta 80)
# Redireciona TUDO para HTTPS. Nada serve em HTTP puro.
# ─────────────────────────────────────────────────────────────────────────────
server {
    listen 80;
    listen [::]:80;

    # Substituir pelo teu hostname Tailscale ou domínio real
    # Exemplo Tailscale: server_name meuservidor.tail1234.ts.net;
    # Exemplo domínio:   server_name auth.meudominio.com;
    server_name _;

    # Redirecionar HTTP → HTTPS (301 = permanente)
    return 301 https://$host$request_uri;
}

# ─────────────────────────────────────────────────────────────────────────────
# SERVIDOR HTTPS (porta 443)
# ─────────────────────────────────────────────────────────────────────────────
server {
    listen 443 ssl;
    listen [::]:443 ssl;
    http2 on;

    # ── Hostname ─────────────────────────────────────────────────────────────
    # Alterar para o teu hostname real.
    # Para Tailscale: meuservidor.tail1234.ts.net
    # Para DuckDNS:   meuapp.duckdns.org
    server_name _;

    # ── Certificados TLS ──────────────────────────────────────────────────────
    # Opção A — Tailscale (RECOMENDADO para servidor caseiro):
    #   No servidor: sudo tailscale cert --cert-file /path/to/fullchain.pem \
    #                                    --key-file  /path/to/privkey.pem \
    #                                    $(tailscale status --json | jq -r .Self.DNSName)
    #   Depois copia os ficheiros para ./nginx/certs/
    #
    # Opção B — Let's Encrypt (se tens domínio público + portas 80/443 abertas):
    #   sudo certbot certonly --standalone -d meuapp.duckdns.org
    #   Copia /etc/letsencrypt/live/meuapp.duckdns.org/* para ./nginx/certs/
    #
    # Opção C — Self-signed (apenas para testes locais):
    #   openssl req -x509 -nodes -days 365 -newkey rsa:4096 \
    #     -keyout nginx/certs/privkey.pem \
    #     -out nginx/certs/fullchain.pem \
    #     -subj "/CN=localhost"
    ssl_certificate     /etc/nginx/certs/fullchain.pem;
    ssl_certificate_key /etc/nginx/certs/privkey.pem;

    # ── Configuração TLS ──────────────────────────────────────────────────────
    # Apenas TLS 1.2 e 1.3 — bloqueia versões antigas com vulnerabilidades conhecidas
    # (POODLE em SSL3, BEAST em TLS1.0, etc.)
    ssl_protocols TLSv1.2 TLSv1.3;

    # Cipher suites modernos e seguros:
    # ECDHE = Perfect Forward Secrecy (sessão comprometida não expõe sessões passadas)
    # GCM/CHACHA20 = autenticados (AEAD) → protegem contra modificação dos dados
    # HIGH = nenhum cipher fraco
    ssl_ciphers 'ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384:ECDHE-ECDSA-CHACHA20-POLY1305:ECDHE-RSA-CHACHA20-POLY1305:ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256';
    ssl_prefer_server_ciphers off;  # TLS 1.3 ignora esta setting; TLS 1.2: cliente escolhe

    # Session cache melhora performance (evita full handshake em cada pedido)
    ssl_session_cache shared:SSL:10m;
    ssl_session_timeout 1d;
    ssl_session_tickets off;  # Desativar: tickets podem ser reutilizados para decrypt

    # OCSP Stapling — o servidor pré-verifica a validade do certificado
    # Reduz latência (cliente não precisa de contactar a CA) e melhora privacidade
    # ssl_stapling on;  # Desativado: não funciona com certificado self-signed
    # ssl_stapling_verify on;

    # ── Security Headers ─────────────────────────────────────────────────────

    # HSTS: força o browser a usar HTTPS para este domínio durante 1 ano
    # preload: pode ser submetido à lista HSTS do browser
    # includeSubDomains: aplica a todos os subdomínios
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains; preload" always;

    # Impede embedding em <iframe> → previne clickjacking
    add_header X-Frame-Options "DENY" always;

    # Impede MIME-type sniffing → browser usa o Content-Type declarado
    add_header X-Content-Type-Options "nosniff" always;

    # Content Security Policy — para uma API REST, bloqueamos tudo
    # 'none' = nenhum recurso externo permitido
    add_header Content-Security-Policy "default-src 'none'; frame-ancestors 'none'" always;

    # Não envia o URL completo no Referer ao aceder links externos
    add_header Referrer-Policy "no-referrer" always;

    # Desativa funcionalidades do browser que não são necessárias numa API
    add_header Permissions-Policy "geolocation=(), microphone=(), camera=()" always;

    # Esconder o header Server nas respostas proxy
    # (server_tokens off já oculta versão, isto remove o header completamente)
    proxy_hide_header Server;
    proxy_hide_header X-Powered-By;

    # ── Rate limiting global ──────────────────────────────────────────────────
    # burst=20: permite um burst de 20 pedidos acima da taxa normal
    # nodelay: não atrasa os pedidos do burst, responde imediatamente
    limit_req zone=auth_limit burst=20 nodelay;

    # ── Restrição de métodos HTTP ─────────────────────────────────────────────
    # Auth + Vault API: GET, POST, PUT, DELETE (vault CRUD)
    if ($request_method !~ ^(GET|POST|PUT|DELETE|OPTIONS|HEAD)$) {
        return 405;
    }

    # ── Bloquear endpoints de documentação em produção ───────────────────────
    # /docs e /redoc expõem a estrutura completa da API — desnecessário em produção
    # (o auth_server.py também os bloqueia, mas defesa em profundidade)
    location ~ ^/(docs|redoc|openapi\.json) {
        return 404;
    }

    # ── Bloquear acesso direto ao endpoint de exemplo ─────────────────────────
    location /protected-example {
        return 404;
    }

    # ── Endpoint de health check ──────────────────────────────────────────────
    # Rate limit mais permissivo (monitorização interna)
    location = /health {
        limit_req zone=auth_limit burst=5 nodelay;
        proxy_pass http://auth_backend;
        include /etc/nginx/conf.d/proxy_params.conf;
    }

    # ── Endpoints de auth com rate limiting estrito ───────────────────────────
    # Login e Register são os alvos principais de brute force e credential stuffing
    location ~ ^/auth/(login|register) {
        # Estritíssimo: máx 3 tentativas por minuto por IP
        # burst=5: tolera um burst pequeno (ex: cliente lento a retry)
        limit_req zone=auth_strict burst=5 nodelay;
        proxy_pass http://auth_backend;
        include /etc/nginx/conf.d/proxy_params.conf;
    }

    # ── Todos os outros endpoints /auth/* ─────────────────────────────────────
    location /auth/ {
        limit_req zone=auth_limit burst=10 nodelay;
        proxy_pass http://auth_backend;
        include /etc/nginx/conf.d/proxy_params.conf;
    }

    # ── Endpoints do Vault encriptado ─────────────────────────────────────────
    # CRUD de entries + gestão de chaves (KEK/DEK). Requer JWT válido.
    location /vault/ {
        limit_req zone=auth_limit burst=10 nodelay;
        proxy_pass http://auth_backend;
        include /etc/nginx/conf.d/proxy_params.conf;
    }

    # ── Bloquear qualquer outra rota ──────────────────────────────────────────
    location / {
        return 404;
    }
}
