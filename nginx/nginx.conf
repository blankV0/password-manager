# ═════════════════════════════════════════════════════════════════════════════
# nginx/nginx.conf — Configuração base do Nginx
# ─────────────────────────────────────────────────────────────────────────────
# Este ficheiro configura o comportamento global do worker Nginx.
# As regras de cada "site" (server block) estão em conf.d/auth.conf
# ═════════════════════════════════════════════════════════════════════════════

# Correr como utilizador sem privilégios dentro do container nginx
user nginx;

# auto = 1 worker por CPU core (otimização de performance)
worker_processes auto;

# Esconder a versão do Nginx nos headers e páginas de erro
# PORQUÊ: reduz surface de ataque — atacantes não sabem que versão/CVEs estão presentes

# Ficheiro de PID (necessário para signals de controlo)
pid /var/run/nginx.pid;

# ─────────────────────────────────────────────────────────────────────────────
# Eventos
# ─────────────────────────────────────────────────────────────────────────────
events {
    # Máximo de conexões simultâneas por worker
    worker_connections 1024;

    # Aceitar múltiplas conexões de uma vez (mais eficiente)
    multi_accept on;
}

# ─────────────────────────────────────────────────────────────────────────────
# HTTP global
# ─────────────────────────────────────────────────────────────────────────────
http {
    # ── Tipos MIME ──────────────────────────────────────────────────────────
    include       /etc/nginx/mime.types;
    server_tokens off;
    default_type  application/octet-stream;

    # ── Formato de log com informações de segurança relevantes ──────────────
    # Inclui: IP, método, URI, status, user-agent, tempo de resposta
    # NÃO inclui: cookies, Authorization header, body (privacidade/segurança)
    log_format security_log
        '$remote_addr - [$time_local] '
        '"$request_method $uri $server_protocol" '
        '$status $body_bytes_sent '
        '"$http_user_agent" '
        'rt=$request_time '
        'upstream_rt=$upstream_response_time';

    access_log /var/log/nginx/access.log security_log;
    error_log  /var/log/nginx/error.log warn;

    # ── Performance ─────────────────────────────────────────────────────────
    sendfile        on;
    tcp_nopush      on;
    tcp_nodelay     on;

    # Fechar conexões ociosas após 65s (padrão seguro)
    keepalive_timeout 65;

    # ── Proteção contra ataques de tamanho ──────────────────────────────────
    # Limitar tamanho máximo do body (previne upload abuse)
    # Para uma API de auth, 16KB é mais que suficiente
    client_max_body_size 16k;

    # Limitar tamanho dos headers (previne header injection attacks)
    large_client_header_buffers 4 8k;

    # Timeout para clientes lentos (previne Slowloris DoS)
    client_body_timeout   10s;
    client_header_timeout 10s;
    send_timeout          10s;

    # ── Rate limiting global ─────────────────────────────────────────────────
    # Zona "auth_limit": max 10 req/s por IP, memória partilhada de 10MB
    # (~160.000 endereços IP tracked simultâneamente)
    # PORQUÊ: mesmo que o app tenha rate limit interno, o Nginx bloqueia
    # antes de o pedido chegar à app (mais eficiente, menos carga)
    limit_req_zone $binary_remote_addr zone=auth_limit:10m rate=10r/s;

    # Zona mais restrita para endpoints sensíveis (login, register)
    limit_req_zone $binary_remote_addr zone=auth_strict:10m rate=3r/m;

    # Resposta quando rate limit é excedido (429 Too Many Requests)
    limit_req_status 429;

    # ── Compressão ──────────────────────────────────────────────────────────
    # Comprime respostas JSON (reduz bandwidth ~70%)
    gzip on;
    gzip_types application/json text/plain;
    gzip_min_length 256;

    # ── Incluir server blocks ────────────────────────────────────────────────
    include /etc/nginx/conf.d/*.conf;
}
